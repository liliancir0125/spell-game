<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>英文聽寫練習機 (好緊張)</title>
    <style>
        :root {
            --main-blue: #5CB8E6;
            --main-pink: #FFB3C1;
            --main-yellow: #FFD93D;
            --bg-light: #FFFFFF;
            --text-dark: #333333;
        }
        /* 禁止快速點擊放大螢幕 */
        * { 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: #E1F4FF; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px; 
            margin: 0;
            color: var(--text-dark);
            overflow-x: hidden; /* 防止橫向捲動 */
        }
        /* Excel 風格：淺綠底深綠字 */
        .slot-correct {
            background-color: #C6EFCE !important;
            color: #006100 !important;
            border-color: #006100 !important;
        }
        /* Excel 風格：淺紅底深紅字 */
        .slot-wrong {
            background-color: #FFC7CE !important;
            color: #9C0006 !important;
            border-color: #9C0006 !important;
        }
        #game-container { 
            width: 98%; 
            max-width: 1000px; /* iPad 橫放時可以更寬一點 */
            border: 6px solid var(--main-blue); 
            background-color: var(--bg-light); 
            border-radius: 20px; 
            box-shadow: 0 5px 0px #A4D8F0; 
            padding: 10px 20px; /* 縮小上下內邊距 */
            text-align: center; 
            box-sizing: border-box;
        }

        h2 { color: var(--main-blue); margin: 5px 0; font-size: 24px; font-weight: 900; }
        
        #selection-bar { 
            background: #F0F8FF; 
            padding: 8px; 
            border-radius: 15px; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            border: 2px solid var(--main-blue);
            flex-wrap: wrap;
        }

        .control-label { font-weight: bold; font-size: 16px; }
        select { padding: 5px; border-radius: 8px; border: 2px solid var(--main-blue); font-size: 16px; font-weight: bold; background: white; }
        
        #review-book-btn { 
            background-color: var(--main-pink); 
            border: 2px solid #FF80AB; 
            color: #C2185B; 
            font-weight: bold; 
            padding: 6px 15px; 
            border-radius: 10px; 
            cursor: pointer;
        }
        
        #input-area { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 10px; 
            margin: 10px auto; 
            min-height: 65px;
        }

        .letter-slot { 
            width: 42px; 
            height: 60px; 
            line-height: 58px; 
            font-size: 38px; 
            font-weight: bold; 
            border: 3px solid var(--main-blue); 
            border-radius: 10px; 
            background: #FFF; 
            color: var(--main-blue);
            text-align: center;
        }
        /* 讓單字間的空格更明顯 */
        .space-slot { width: 30px; }

        #hint-display { font-size: 24px; font-weight: bold; color: #E67E22; margin-bottom: 5px; }
        #feedback { font-size: 20px; font-weight: bold; color: #FF5252; min-height: 24px; margin-bottom: 5px; }
        
        /* 鍵盤：A-Z 三行排序 */
        #keyboard { 
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 10px auto;
            max-width: 900px;
        }
        .kb-row { display: flex; justify-content: center; gap: 8px; }

        .key { 
            background-color: #A4E2FF; 
            border: none; 
            width: 60px; /* 固定寬度讓排列更整齊 */
            height: 60px;
            font-size: 24px; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            color: white;
            box-shadow: 0 4px 0px #5CB8E6;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .key:active { transform: translateY(2px); box-shadow: 0 2px 0px #5CB8E6; }
        #delete-key { width: 90px; background-color: #999; box-shadow: 0 4px 0px #666; }
        
        .control-btn { 
            flex: 1; /* 讓三個按鈕等寬 */
            max-width: 250px;
            padding: 15px 10px; 
            font-size: 20px; 
            font-weight: bold; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            color: white;
        }
        #start-btn { background-color: #999; box-shadow: 0 4px 0px #666; }
        #repeat-btn { background-color: #4CAF50; box-shadow: 0 4px 0px #388E3C; }
        #check-btn { background-color: var(--main-yellow); color: #856404; box-shadow: 0 4px 0px #FBC02D; }
        #check-btn:disabled { background-color: #E0E0E0; color: #999; box-shadow: none; opacity: 1; }
        /* 視覺上的按鈕按壓效果 */
        .control-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
        .control-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }
        
        #controls { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 15px
        }
    </style>
</head>
<body>

<div id="game-container">
    <h2>🦊 英文聽寫練習機 🎓</h2>
    
    <div id="selection-bar">
        <div>
            <span class="control-label">範圍：</span>
            <select id="start-unit-select"></select>
            <span class="control-label">~</span>
            <select id="end-unit-select"></select>
        </div>
        <button id="review-book-btn" onclick="startWrongWordMode()">📝 錯題本 (0)</button>
    </div>

    <div id="hint-display">準備好了嗎？點擊開始！</div>
    <div id="feedback"></div>
    <div id="input-area"></div>

    <div id="controls">
        <button id="start-btn" class="control-btn" onclick="startGame()">🚀 開始遊戲</button>
        <button id="repeat-btn" class="control-btn" onclick="readWord(currentWord)" disabled>🔈 重複唸一遍</button>
        <button id="check-btn" class="control-btn" onclick="checkSpelling()" disabled>✅ 對答案</button>
    </div>

    <div id="keyboard"></div>
</div>

<script>
    let allWordUnits = {}; // 讓它先保持空白，等下載完成
    let currentWord = "", currentSpelling = [], currentWordList = [], wordIndex = 0, errorList = [];
    let isGameActive = false, isReviewMode = false, flatUnits = [];
    let voicesLoaded = false;
    const synth = window.speechSynthesis;
    const praiseWords = ["Great job", "Excellent", "Amazing", "Super star", "Well done", "Fantastic"];

    // A-Z 三行佈局
    const azLayout = [
        "ABCDEFGHI",   // 9
        "JKLMNOPQR",   // 9
        "STUVWXYZ"    // 8 + DEL
    ];

    function initSelection() {
        const startSel = document.getElementById('start-unit-select');
        const endSel = document.getElementById('end-unit-select');
        flatUnits = [];
        ["G1", "G2"].forEach(g => {
            Object.keys(allWordUnits[g]).forEach(u => { flatUnits.push({ grade: g, unit: u }); });
        });
        flatUnits.forEach((item, idx) => {
            const label = `${item.grade}-${item.unit}`;
            startSel.add(new Option(label, idx));
            endSel.add(new Option(label, idx));
        });
        startSel.selectedIndex = 0; // 設定起點為第一個 (G1-U1)
        endSel.selectedIndex = 0;   // 設定終點也為第一個 (G1-U1)
        updateWrongWordCount();
    }

    function createKeyboard() {
        const kbContainer = document.getElementById('keyboard');
        kbContainer.innerHTML = '';
        azLayout.forEach((rowString, index) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'kb-row';
            rowString.split('').forEach(l => {
                const b = document.createElement('button');
                b.className = 'key';
                b.textContent = l;
                b.onclick = () => handleKeyClick(l);
                rowDiv.appendChild(b);
            });
            if (index === 2) {
                const del = document.createElement('button');
                del.id = 'delete-key';
                del.className = 'key';
                del.textContent = 'DEL';
                del.onclick = handleDelete;
                rowDiv.appendChild(del);
            }
            kbContainer.appendChild(rowDiv);
        });
    }

    function updateWrongWordCount() {
        const book = JSON.parse(localStorage.getItem('wrongWords') || '[]');
        document.getElementById('review-book-btn').textContent = `📝 錯題本 (${book.length})`;
    }

    function startGame() {
        if (isGameActive && document.getElementById('start-btn').textContent === '💪下一個單字') {
            handleSkip(); return;
        }
        const startIdx = parseInt(document.getElementById('start-unit-select').value);
        const endIdx = parseInt(document.getElementById('end-unit-select').value);
        if (startIdx > endIdx) { alert("範圍錯誤！"); return; }
        currentWordList = [];
        for (let i = startIdx; i <= endIdx; i++) {
            const {grade, unit} = flatUnits[i];
            currentWordList = currentWordList.concat(allWordUnits[grade][unit]);
        }
        currentWordList.sort(() => Math.random() - 0.5);
        wordIndex = 0; errorList = []; isGameActive = true; isReviewMode = false;
        loadNextWord();
    }
    function handleSkip() {
        const target = currentWord.replace(/\s/g, '').toLowerCase();
        
        // 1. 顯示正確解答與紅綠顏色
        for (let i = 0; i < target.length; i++) {
            const slot = document.getElementById(`slot-${i}`);
            const correctChar = target[i];
            if (currentSpelling[i] === correctChar) {
                slot.className = 'letter-slot slot-correct';
            } else {
                slot.className = 'letter-slot slot-wrong';
            }
            slot.textContent = correctChar;
        }
    
        // 2. 語音與記錄
        document.getElementById('feedback').textContent = `📝 已記錄在待複習清單裡`;
        saveWrongWord(currentWordList[wordIndex]);
        if (!errorList.includes(currentWordList[wordIndex])) errorList.push(currentWordList[wordIndex]);
        
        readWord("The answer is");
        setTimeout(() => readWord(currentWord), 800);
    
        // 3. 兩秒後跳下一題
        setTimeout(() => {
            wordIndex++;
            loadNextWord();
        }, 2500);
    }
    function startWrongWordMode() {
        const book = JSON.parse(localStorage.getItem('wrongWords') || '[]');
        if (book.length === 0) { alert("沒有錯題！"); return; }
        currentWordList = [...book].sort(() => Math.random() - 0.5);
        wordIndex = 0; errorList = []; isGameActive = true; isReviewMode = true;
        loadNextWord();
    }
    
    function handleMainAction() {
        const btn = document.getElementById('check-btn');
        if (btn.textContent === '✅ 拼寫檢查') {
            checkSpelling();
        } else if (btn.textContent === '🔄 重試') {
            resetInput();
            btn.textContent = '✅ 拼寫檢查';
            btn.disabled = true; // 重置後格未滿，需禁用
        }
    }
    function loadNextWord() {
        if (wordIndex >= currentWordList.length) {
            if (isReviewMode) endGame(); else handleRoundEnd();
            return;
        }
        const data = currentWordList[wordIndex];
        currentWord = data.word.toLowerCase();
        currentSpelling = Array(currentWord.replace(/\s/g, '').length).fill(""); // 初始化空陣列
        
        document.getElementById('input-area').innerHTML = '';
        document.getElementById('feedback').textContent = '';
        
        // 按鈕狀態重置
        const checkBtn = document.getElementById('check-btn');
        checkBtn.textContent = '✅ 拼寫檢查';
        checkBtn.disabled = true;
        checkBtn.onclick = handleMainAction; 
    
        const info = isReviewMode ? "挑戰中" : `${wordIndex+1}/${currentWordList.length}`;
        document.getElementById('hint-display').textContent = `[${info}] ${data.hint}`;
    
        let lIdx = 0;
        currentWord.split('').forEach(char => {
            if (char === ' ') {
                const s = document.createElement('div'); s.className = 'space-slot';
                document.getElementById('input-area').appendChild(s);
            } else {
                const div = document.createElement('div'); div.className = 'letter-slot'; div.id = `slot-${lIdx++}`;
                document.getElementById('input-area').appendChild(div);
            }
        });
        readWord(currentWord);
    }
    // 處理重複唸一次按鈕
    function handleRepeatClick() {
        readWord(currentWord);
    }
    
    // 處理檢查按鈕
    function handleCheckClick() {
        const btn = document.getElementById('check-btn');
        if (btn.textContent === '🔄 重試') {
            resetInput();
        } else {
            checkSpelling();
        }
    }
    function checkSpelling() {
        const target = currentWord.replace(/\s/g, '').toLowerCase();
        let allCorrect = true;
    
        for (let i = 0; i < target.length; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if (currentSpelling[i] === target[i]) {
                slot.className = 'letter-slot slot-correct';
            } else {
                slot.className = 'letter-slot slot-wrong';
                allCorrect = false;
            }
        }
    
        if (allCorrect) {
            document.getElementById('feedback').textContent = '🌟 太棒了！';
            if (isReviewMode && !errorList.includes(currentWordList[wordIndex])) {
                removeWrongWord(currentWord);
            }
            const praise = praiseWords[Math.floor(Math.random() * praiseWords.length)];
            readWord(praise); 
            setTimeout(() => { wordIndex++; loadNextWord(); }, 1200);
        } else {
            document.getElementById('feedback').textContent = '💡 再試一次！';
            saveWrongWord(currentWordList[wordIndex]);
            if (!errorList.includes(currentWordList[wordIndex])) errorList.push(currentWordList[wordIndex]);
            
            readWord("Try again"); 
            // 轉變為重試模式
            const checkBtn = document.getElementById('check-btn');
            checkBtn.textContent = '🔄 重試';
            checkBtn.disabled = false;
        }
    }

    function resetInput() {
        const target = currentWord.replace(/\s/g, '').toLowerCase();
        
        // 建立一個新的陣列，用來存放要保留的字母
        let updatedSpelling = [];
        let firstEmptyIndex = -1;
    
        for (let i = 0; i < target.length; i++) {
            const slot = document.getElementById(`slot-${i}`);
            
            // 如果這個位置原本打的是對的，就保留
            if (currentSpelling[i] === target[i]) {
                updatedSpelling[i] = currentSpelling[i];
                // 保持綠色外觀
                slot.className = 'letter-slot slot-correct';
            } else {
                // 如果錯了，徹底清空畫面與資料
                updatedSpelling[i] = ""; 
                slot.textContent = '';
                slot.className = 'letter-slot'; // 變回空白格樣式
                
                // 記住第一個需要補打的位置
                if (firstEmptyIndex === -1) firstEmptyIndex = i;
            }
        }
        
        // 重要：將目前的輸入進度更新為保留後的狀態
        currentSpelling = updatedSpelling;
        
        // 重設按鈕狀態
        document.getElementById('check-btn').textContent = '✅ 拼寫檢查';
        document.getElementById('check-btn').onclick = checkSpelling;
        document.getElementById('check-btn').disabled = true;
    
        // 提示孩子
        document.getElementById('feedback').textContent = '💡 請補上紅色的地方';
    }

    function showAnswer() {
        const target = targetWord = currentWord.replace(/\s/g, '');
        
        for(let i=0; i<target.length; i++) {
            const slot = document.getElementById(`slot-${i}`);
            const correctChar = target[i];
            const playerChar = currentSpelling[i];
    
            // 標記紅綠色後顯示正確字母
            if (playerChar === correctChar) {
                slot.className = 'letter-slot slot-correct';
            } else {
                slot.className = 'letter-slot slot-wrong';
            }
            slot.textContent = correctChar; 
        }
    
        saveWrongWord(currentWordList[wordIndex]);
        if (!errorList.includes(currentWordList[wordIndex])) errorList.push(currentWordList[wordIndex]);
    
        document.getElementById('feedback').textContent = `別擔心，記錄在待複習清單囉！`;
        readWord("The answer is");
        setTimeout(() => readWord(currentWord), 800);
        setTimeout(() => { wordIndex++; loadNextWord(); }, 2500);
    }

    function handleRoundEnd() {
        if (errorList.length > 0 && !isReviewMode) {
            if (confirm(`這輪結束！剛剛有 ${errorList.length} 個字錯了，要現在複習嗎？`)) {
                currentWordList = [...errorList]; wordIndex = 0; errorList = [];
                isReviewMode = true;
                loadNextWord();
                return;
            }
        }
        endGame();
    }

    function endGame() {
        isGameActive = false;
        document.getElementById('hint-display').textContent = '🎊 恭喜妳完成練習！';
        document.getElementById('start-btn').textContent = '重新開始';
        document.getElementById('repeat-btn').disabled = true;
        document.getElementById('check-btn').disabled = true;
        document.getElementById('answer-btn').disabled = true;
        updateWrongWordCount();
    }

    function saveWrongWord(data) {
        let book = JSON.parse(localStorage.getItem('wrongWords') || '[]');
        if (!book.find(w => w.word.toLowerCase() === data.word.toLowerCase())) {
            book.push(data); localStorage.setItem('wrongWords', JSON.stringify(book));
            updateWrongWordCount();
        }
    }
    function removeWrongWord(text) {
        let book = JSON.parse(localStorage.getItem('wrongWords') || '[]');
        book = book.filter(w => w.word.toLowerCase() !== text.toLowerCase());
        localStorage.setItem('wrongWords', JSON.stringify(book));
        updateWrongWordCount();
    }

    function readWord(text) {
        synth.cancel();
        const voices = synth.getVoices();
        const femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Google') || v.name.includes('Samantha')));
        const utter = new SpeechSynthesisUtterance(text.toLowerCase()); 
        if (femaleVoice) utter.voice = femaleVoice;
        utter.rate = 0.8;
        utter.pitch = 1.25;
        synth.speak(utter);
    }

    function handleKeyClick(l) {
        const target = currentWord.replace(/\s/g, '').toLowerCase();
        
        // 尋找第一個「內容為空」的格子索引
        let nextEmptyIndex = -1;
        for (let i = 0; i < target.length; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if (!slot.textContent) {
                nextEmptyIndex = i;
                break;
            }
        }
        
        if (nextEmptyIndex !== -1) {
            currentSpelling[nextEmptyIndex] = l.toLowerCase();
            const slot = document.getElementById(`slot-${nextEmptyIndex}`);
            slot.textContent = l.toLowerCase();
            // 輸入時移除錯誤紅底，保持乾淨
            slot.classList.remove('slot-wrong'); 
        }
    
        // 檢查是否所有格子都填滿了
        const filledCount = currentSpelling.filter(char => char && char.trim() !== "").length;
        document.getElementById('check-btn').disabled = (filledCount !== target.length);
    }
    
    function handleDelete() {
        // 找出「最後一個有字」且「不是正確綠色」的格子來刪除
        const target = currentWord.replace(/\s/g, '').toLowerCase();
        for (let i = target.length - 1; i >= 0; i--) {
            const slot = document.getElementById(`slot-${i}`);
            if (slot.textContent && !slot.classList.contains('slot-correct')) {
                slot.textContent = '';
                slot.classList.remove('slot-wrong');
                currentSpelling[i] = "";
                break;
            }
        }
        document.getElementById('check-btn').disabled = true;
    }

    function handleDelete() {
        if (currentSpelling.length > 0) {
            document.getElementById(`slot-${currentSpelling.length-1}`).textContent = '';
            currentSpelling.pop();
            document.getElementById('check-btn').disabled = true;
            document.getElementById('check-btn').textContent = '✅ 拼寫檢查';
        }
    }

    window.onload = async () => {
        // 強制啟動語音引擎加載
        synth.getVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => synth.getVoices();
        }
    
        try {
            const response = await fetch('https://raw.githubusercontent.com/liliancir0125/spell-game/refs/heads/main/word_bank.json');
            if (!response.ok) throw new Error('連線失敗');
            allWordUnits = await response.json();
            
            initSelection();
            createKeyboard();
            updateWrongWordCount();
            console.log("全部載入完成！");
        } catch (error) {
            console.error("錯誤:", error);
            document.getElementById('hint-display').textContent = "❌ 無法載入單字庫";
        }
    };
</script>
</body>
</html>
